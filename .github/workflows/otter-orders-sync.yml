name: Otter Orders Sync
on:
  schedule:
    - cron: '15 */3 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window (1-14)'
        default: '3'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/otter/orders-sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DAYS: ${{ github.event.inputs.days || '3' }}
        run: |
          curl -fsSL -X POST "$APP_URL/api/otter/orders-sync" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 290 \
            -d "{\"days\": $DAYS}"
