name: Otter Orders Sync
on:
  schedule:
    # Every 4 hours on the hour. Preserves useful same-day order KPIs while
    # cutting repeated 3-day window updates versus the old hourly cadence.
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window (1-14)'
        default: '3'

concurrency:
  group: otter-orders-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/otter/orders-sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DAYS: ${{ github.event.inputs.days || '3' }}
        run: |
          curl -fsSL -X POST "$APP_URL/api/otter/orders-sync" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 290 \
            -d "{\"days\": $DAYS}"
