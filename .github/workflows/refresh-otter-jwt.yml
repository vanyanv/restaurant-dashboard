name: Refresh Otter JWT
on:
  schedule:
    - cron: '0 0 */2 * *' # Every 2 days at midnight UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Sign in to Otter
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST https://api.tryotter.com/users/sign_in \
            -H "Content-Type: application/json" \
            -H "Accept: */*" \
            -H "Origin: https://manager.tryotter.com" \
            -H "Referer: https://manager.tryotter.com/" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36" \
            -d '{"email":"${{ secrets.OTTER_EMAIL }}","password":"${{ secrets.OTTER_PASSWORD }}"}')
          JWT=$(echo "$RESPONSE" | jq -r '.accessToken')
          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "Failed to get Otter JWT"
            echo "$RESPONSE" | jq -r '.message // empty'
            exit 1
          fi
          echo "::add-mask::$JWT"
          echo "jwt=$JWT" >> $GITHUB_OUTPUT
          echo "Got fresh JWT (${#JWT} chars)"

      - name: Update Vercel OTTER_JWT env var
        run: |
          PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID }}"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          JWT="${{ steps.auth.outputs.jwt }}"

          # Find the existing OTTER_JWT env var ID
          ENV_ID=$(curl -s -X GET "https://api.vercel.com/v9/projects/${PROJECT_ID}/env" \
            -H "Authorization: Bearer ${TOKEN}" \
            | jq -r '.envs[] | select(.key == "OTTER_JWT") | .id')

          if [ -z "$ENV_ID" ] || [ "$ENV_ID" = "null" ]; then
            echo "OTTER_JWT env var not found in Vercel, creating it..."
            curl -s -X POST "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"OTTER_JWT\",\"value\":\"${JWT}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" \
              | jq '{id: .created.id, key: .created.key}'
          else
            echo "Updating OTTER_JWT (env ID: ${ENV_ID})..."
            curl -s -X PATCH "https://api.vercel.com/v9/projects/${PROJECT_ID}/env/${ENV_ID}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"value\":\"${JWT}\"}" \
              | jq '{key: .key, updated: .updatedAt}'
          fi

          echo "Vercel OTTER_JWT updated successfully"
