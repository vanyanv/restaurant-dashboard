name: AI Analytics — Invoices (every 6h)
on:
  schedule:
    # Every 6 hours at :45. Invoices change slowly — vendors deliver on
    # daily-to-weekly cadences — so polling more often gives no benefit.
    - cron: '45 4,10,16,22 * * *'
  workflow_dispatch: {}

concurrency:
  group: ai-analytics-invoices
  cancel-in-progress: false

jobs:
  list-stores:
    runs-on: ubuntu-latest
    outputs:
      ids: ${{ steps.fetch.outputs.ids }}
    steps:
      - id: fetch
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          payload=$(curl -fsSL "$APP_URL/api/cron/ai-analytics/stores" \
            -H "Authorization: Bearer $CRON_SECRET" --max-time 30)
          ids=$(echo "$payload" | jq -c '[.stores[].id]')
          echo "ids=$ids" >> "$GITHUB_OUTPUT"

  per-store:
    needs: list-stores
    if: needs.list-stores.outputs.ids != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        storeId: ${{ fromJson(needs.list-stores.outputs.ids) }}
    steps:
      - env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          STORE_ID: ${{ matrix.storeId }}
        run: |
          set -euo pipefail
          AUTH="Authorization: Bearer $CRON_SECRET"

          # Phase 1: prompt — fetch source data, build prompts, return runId
          start=$(curl -fsSL -X POST \
            "$APP_URL/api/cron/ai-analytics/invoices?storeId=$STORE_ID" \
            -H "$AUTH" --max-time 55)
          echo "$start" | jq .
          RUN_ID=$(echo "$start" | jq -r .runId)
          NEXT=$(echo "$start" | jq -r .nextStep)

          # Phase 2: generator
          if [ "$NEXT" = "generate" ]; then
            gen=$(curl -fsSL -X POST \
              "$APP_URL/api/cron/ai-analytics/run/$RUN_ID/generate" \
              -H "$AUTH" --max-time 55)
            echo "$gen" | jq .
            NEXT=$(echo "$gen" | jq -r .nextStep)
          fi

          # Phase 3: critic + persist insights
          if [ "$NEXT" = "critique" ]; then
            curl -fsSL -X POST \
              "$APP_URL/api/cron/ai-analytics/run/$RUN_ID/critique" \
              -H "$AUTH" --max-time 55 | jq .
          fi

  rollup:
    needs: list-stores
    if: needs.list-stores.outputs.ids != '[]'
    runs-on: ubuntu-latest
    steps:
      - env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          AUTH="Authorization: Bearer $CRON_SECRET"

          start=$(curl -fsSL -X POST \
            "$APP_URL/api/cron/ai-analytics/invoices?scope=all" \
            -H "$AUTH" --max-time 55)
          echo "$start" | jq .
          RUN_ID=$(echo "$start" | jq -r .runId)
          NEXT=$(echo "$start" | jq -r .nextStep)

          if [ "$NEXT" = "generate" ]; then
            gen=$(curl -fsSL -X POST \
              "$APP_URL/api/cron/ai-analytics/run/$RUN_ID/generate" \
              -H "$AUTH" --max-time 55)
            echo "$gen" | jq .
            NEXT=$(echo "$gen" | jq -r .nextStep)
          fi

          if [ "$NEXT" = "critique" ]; then
            curl -fsSL -X POST \
              "$APP_URL/api/cron/ai-analytics/run/$RUN_ID/critique" \
              -H "$AUTH" --max-time 55 | jq .
          fi
