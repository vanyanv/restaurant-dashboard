name: Vercel Usage Snapshot
on:
  schedule:
    # Every 15 minutes — feeds the monitoring "Vercel quotas" panel.
    # Note: GitHub-hosted runner schedules can be delayed several minutes
    # under load; this is fine for observational snapshots.
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: vercel-usage-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/vercel-usage
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -fsSL -X POST "$APP_URL/api/cron/vercel-usage" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 60)
          echo "$response" | jq .
          {
            echo '```json'
            echo "$response" | jq .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
