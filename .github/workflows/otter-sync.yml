name: Otter Daily Sync
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/backfill-otter.ts 3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OTTER_JWT: ${{ secrets.OTTER_JWT }}
