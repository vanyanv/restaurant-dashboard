name: Otter Daily Sync
on:
  schedule:
    # Every 2 hours. Bumped from every 6h to keep daily/menu totals fresh
    # through the day as Otter's EOD aggregations land. Concurrency lock
    # prevents pile-up if a run drags.
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: otter-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/backfill-otter.ts 3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OTTER_JWT: ${{ secrets.OTTER_JWT }}
