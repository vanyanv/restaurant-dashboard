name: Otter Hourly Sync
on:
  schedule:
    # Every 4 hours for the dashboard "Service by the hour" card.
    # 2-day rolling window covers late-arriving orders + retroactive Otter edits.
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: otter-hourly-sync
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Sync Otter hourly
        id: cron
        run: |
          bash .github/scripts/run-with-cron-logging.sh \
            npx tsx scripts/sync-otter-hourly.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OTTER_JWT: ${{ secrets.OTTER_JWT }}
          OTTER_EMAIL: ${{ secrets.OTTER_EMAIL }}
          OTTER_PASSWORD: ${{ secrets.OTTER_PASSWORD }}
          LOG_FILE: logs/otter-hourly-sync.log
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: otter-hourly-sync-log-${{ github.run_id }}
          path: logs/otter-hourly-sync.log
          retention-days: 14
      - name: Open or update incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: Otter Hourly Sync
          ISSUE_TITLE: "[Auto] Otter Hourly Sync failing"
          ISSUE_LABEL: cron-failure
          LOG_FILE: logs/otter-hourly-sync.log
          FAILED_EXIT_CODE: ${{ steps.cron.outputs.status }}
        run: bash .github/scripts/report-workflow-failure.sh
