name: Otter Hourly Sync
on:
  schedule:
    # Hourly precompute for the dashboard "Service by the hour" card.
    # 2-day rolling window covers late-arriving orders + retroactive Otter edits.
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: otter-hourly-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scripts/sync-otter-hourly.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OTTER_JWT: ${{ secrets.OTTER_JWT }}
