name: COGS Stale Sweep
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/cogs/stale-sweep
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsSL -X POST "$APP_URL/api/cron/cogs/stale-sweep" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 295
