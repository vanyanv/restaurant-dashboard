name: COGS Sweep (4-hour, 3 days)
on:
  schedule:
    # Every 4 hours at :30 — staggered so the :00 Otter orders sync has
    # settled before we recompute COGS off it. Window is the last 3 days;
    # daily 30-day refresh still catches slower corrections overnight.
    - cron: '30 */4 * * *'
  workflow_dispatch:
    inputs:
      lookbackDays:
        description: 'Days to recompute (default 3)'
        default: '3'
      force:
        description: 'Include empty stores and bypass source-change skip'
        default: 'false'

concurrency:
  group: cogs-sweep
  cancel-in-progress: false

jobs:
  list-stores:
    runs-on: ubuntu-latest
    outputs:
      ids: ${{ steps.fetch.outputs.ids }}
    steps:
      - name: GET /api/cron/cogs/stores
        id: fetch
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          payload=$(curl -fsSL "$APP_URL/api/cron/cogs/stores?force=$FORCE" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 30)
          ids=$(echo "$payload" | jq -c '[.stores[].id]')
          echo "Found stores: $ids"
          echo "ids=$ids" >> "$GITHUB_OUTPUT"

  sweep:
    needs: list-stores
    if: needs.list-stores.outputs.ids != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        storeId: ${{ fromJson(needs.list-stores.outputs.ids) }}
    steps:
      - name: POST /api/cron/cogs/sweep (last 3 days)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          STORE_ID: ${{ matrix.storeId }}
          LOOKBACK: ${{ github.event.inputs.lookbackDays || '3' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          response=$(curl -fsSL -X POST \
            "$APP_URL/api/cron/cogs/sweep?storeId=$STORE_ID&lookbackDays=$LOOKBACK&force=$FORCE" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 295)
          echo "$response" | jq .
          echo "### Store $STORE_ID" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$response" | jq . >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
