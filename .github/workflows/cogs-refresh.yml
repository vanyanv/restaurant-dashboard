name: COGS Refresh (daily, 30 days)
on:
  schedule:
    # 07:00 UTC = 03:00 America/New_York â€” quiet time, after the morning Otter
    # sync window. Catches retroactive invoice corrections within the normal
    # reporting horizon. For full-year rebuilds use the manual "Recompute COGS"
    # button on the dashboard or `pnpm tsx scripts/backfill-daily-cogs.ts`.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      lookbackDays:
        description: 'Days to recompute (default 30)'
        default: '30'
      force:
        description: 'Include empty stores and bypass source-change skip'
        default: 'false'

concurrency:
  group: cogs-refresh
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  list-stores:
    runs-on: ubuntu-latest
    outputs:
      ids: ${{ steps.fetch.outputs.ids }}
    steps:
      - uses: actions/checkout@v6
      - name: GET /api/cron/cogs/stores
        id: fetch
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          LOG_FILE: logs/cogs-refresh-list-stores.log
          CRON_MAX_TIME: "30"
        run: |
          bash .github/scripts/run-with-cron-logging.sh bash -lc '
            payload=$(.github/scripts/curl-cron-json.sh GET "$APP_URL/api/cron/cogs/stores?force=$FORCE")
            ids=$(echo "$payload" | jq -c "[.stores[].id]")
            echo "Found stores: $ids"
            echo "ids=$ids" >> "$GITHUB_OUTPUT"
          '
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cogs-refresh-list-stores-log-${{ github.run_id }}
          path: logs/cogs-refresh-list-stores.log
          retention-days: 14
      - name: Open or update incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: COGS Refresh Stores
          ISSUE_TITLE: "[Auto] COGS Refresh Stores failing"
          ISSUE_LABEL: cron-failure
          LOG_FILE: logs/cogs-refresh-list-stores.log
          FAILED_EXIT_CODE: ${{ steps.fetch.outputs.status }}
        run: bash .github/scripts/report-workflow-failure.sh

  refresh:
    needs: list-stores
    if: needs.list-stores.outputs.ids != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        storeId: ${{ fromJson(needs.list-stores.outputs.ids) }}
    steps:
      - uses: actions/checkout@v6
      - name: POST /api/cron/cogs/sweep (last 30 days)
        id: cron
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          STORE_ID: ${{ matrix.storeId }}
          LOOKBACK: ${{ github.event.inputs.lookbackDays || '30' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          LOG_FILE: logs/cogs-refresh-${{ matrix.storeId }}.log
          CRON_MAX_TIME: "295"
        run: |
          bash .github/scripts/run-with-cron-logging.sh \
            .github/scripts/curl-cron-json.sh POST "$APP_URL/api/cron/cogs/sweep?storeId=$STORE_ID&lookbackDays=$LOOKBACK&force=$FORCE"
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cogs-refresh-log-${{ matrix.storeId }}-${{ github.run_id }}
          path: logs/cogs-refresh-${{ matrix.storeId }}.log
          retention-days: 14
      - name: Open or update incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: COGS Refresh
          ISSUE_TITLE: "[Auto] COGS Refresh failing"
          ISSUE_LABEL: cron-failure
          LOG_FILE: logs/cogs-refresh-${{ matrix.storeId }}.log
          FAILED_EXIT_CODE: ${{ steps.cron.outputs.status }}
        run: bash .github/scripts/report-workflow-failure.sh
