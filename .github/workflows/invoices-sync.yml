name: Invoices Sync
on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/invoices/sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsSL -X POST "$APP_URL/api/invoices/sync" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 115
