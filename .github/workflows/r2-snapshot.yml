name: R2 Bucket Snapshot
on:
  schedule:
    # Daily at 04:00 UTC — feeds the monitoring "R2 bucket" panel.
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: r2-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/r2-snapshot
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -fsSL -X POST "$APP_URL/api/cron/r2-snapshot" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 90)
          echo "$response" | jq .
          {
            echo '```json'
            echo "$response" | jq .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
