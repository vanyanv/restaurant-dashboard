name: External Signals Sync (weather + events)

# Refreshes StoreWeatherSignal + StoreEventSignal nightly so the ML
# "enriched" model flavor has current data to train on. Without this,
# weather/event features go stale and the enriched-vs-baseline gate in
# ml.run_nightly.should_promote_enriched silently falls back to baseline.
#
# Schedule: 05:30 UTC — 30 min before ml-nightly (06:00 UTC). Independent
# workflow, not a step inside ml-nightly: a flaky provider should not
# block training. The trainer joins zero-filled defaults when signals
# are missing, so a failed run degrades gracefully to baseline.
#
# Window: trailing 7 days + 14 days forward. UPSERTs are idempotent so
# the 7-day overlap absorbs PredictHQ rank/attendance revisions that
# land after an event concludes. For one-time historical backfill, use
# workflow_dispatch with a wide start-date.

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      provider:
        description: 'weather | predicthq | events | all'
        default: 'all'
      startDate:
        description: 'Backfill start (YYYY-MM-DD). Empty = trailing 7 days.'
        default: ''
      futureDays:
        description: 'Days forward to fetch'
        default: '14'

concurrency:
  group: external-signals-sync
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PREDICTHQ_API_TOKEN: ${{ secrets.PREDICTHQ_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install ML deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt

      - name: Resolve sync window
        id: window
        run: |
          PROVIDER="${{ inputs.provider }}"
          START_DATE="${{ inputs.startDate }}"
          FUTURE_DAYS="${{ inputs.futureDays }}"
          echo "provider=${PROVIDER:-all}" >> "$GITHUB_OUTPUT"
          echo "future_days=${FUTURE_DAYS:-14}" >> "$GITHUB_OUTPUT"
          if [ -z "$START_DATE" ]; then
            START_DATE=$(date -u -d '7 days ago' +%F)
          fi
          echo "start_date=$START_DATE" >> "$GITHUB_OUTPUT"

      - name: Sync external signals
        id: sync
        run: |
          mkdir -p logs
          python -m ml.external_signal_sync \
            --provider "${{ steps.window.outputs.provider }}" \
            --start-date "${{ steps.window.outputs.start_date }}" \
            --future-days "${{ steps.window.outputs.future_days }}" \
            --triggered-by "${{ github.event_name }}" \
            2>&1 | tee logs/external-signals-sync.log

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-signals-sync-log-${{ github.run_id }}
          path: logs/external-signals-sync.log
          retention-days: 14

      - name: Open or update incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: External Signals Sync
          ISSUE_TITLE: "[Auto] External Signals Sync failing"
          ISSUE_LABEL: cron-failure
          LOG_FILE: logs/external-signals-sync.log
          FAILED_EXIT_CODE: ${{ steps.sync.outputs.status }}
        run: bash .github/scripts/report-workflow-failure.sh
