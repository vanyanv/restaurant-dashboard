name: Otter Order-Details Drain (weekly, per-store)
on:
  schedule:
    # Weekly off-hours at 09:15 UTC on Monday. The historical backlog is now
    # small; manual workflow_dispatch remains available for new-store backfills.
    - cron: '15 9 * * 1'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max rows per store per run (default 1500)'
        default: '1500'
      olderThanDays:
        description: 'Only drain orders older than N days (default 3)'
        default: '3'

concurrency:
  group: otter-drain
  cancel-in-progress: false

jobs:
  list-stores:
    runs-on: ubuntu-latest
    outputs:
      ids: ${{ steps.fetch.outputs.ids }}
    steps:
      - name: GET /api/cron/otter/stores
        id: fetch
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          payload=$(curl -fsSL "$APP_URL/api/cron/otter/stores" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 30)
          ids=$(echo "$payload" | jq -c '[.stores[].storeId]')
          echo "Found stores: $ids"
          echo "ids=$ids" >> "$GITHUB_OUTPUT"

  drain:
    needs: list-stores
    if: needs.list-stores.outputs.ids != '[]'
    runs-on: ubuntu-latest
    strategy:
      # max-parallel: 1 — fetchOrderDetails hits Otter's GraphQL endpoint
      # which rate-limits per-token. A single store's drain runs ~5 concurrent
      # requests internally; running multiple stores in parallel risks 429s.
      fail-fast: false
      max-parallel: 1
      matrix:
        storeId: ${{ fromJson(needs.list-stores.outputs.ids) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Drain order details for store ${{ matrix.storeId }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OTTER_JWT: ${{ secrets.OTTER_JWT }}
          STORE_ID: ${{ matrix.storeId }}
          LIMIT: ${{ github.event.inputs.limit || '1500' }}
          OLDER_THAN_DAYS: ${{ github.event.inputs.olderThanDays || '3' }}
        run: |
          npx tsx scripts/drain-otter-order-details.ts \
            --store-id="$STORE_ID" \
            --limit="$LIMIT" \
            --older-than-days="$OLDER_THAN_DAYS"
