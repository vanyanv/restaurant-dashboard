name: Otter Order-Details Drain (weekly, per-store)
on:
  schedule:
    # Weekly off-hours at 09:15 UTC on Monday. The historical backlog is now
    # small; manual workflow_dispatch remains available for new-store backfills.
    - cron: '15 9 * * 1'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max rows per store per run (default 1500)'
        default: '1500'
      olderThanDays:
        description: 'Only drain orders older than N days (default 3)'
        default: '3'

concurrency:
  group: otter-drain
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  list-stores:
    runs-on: ubuntu-latest
    outputs:
      ids: ${{ steps.fetch.outputs.ids }}
    steps:
      - uses: actions/checkout@v6
      - name: GET /api/cron/otter/stores
        id: fetch
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          LOG_FILE: logs/otter-drain-list-stores.log
          CRON_MAX_TIME: "30"
        run: |
          bash .github/scripts/run-with-cron-logging.sh bash -lc '
            payload=$(.github/scripts/curl-cron-json.sh GET "$APP_URL/api/cron/otter/stores")
            ids=$(echo "$payload" | jq -c "[.stores[].storeId]")
            echo "Found stores: $ids"
            echo "ids=$ids" >> "$GITHUB_OUTPUT"
          '
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: otter-drain-list-stores-log-${{ github.run_id }}
          path: logs/otter-drain-list-stores.log
          retention-days: 14
      - name: Open or update incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: Otter Order-Details Drain Stores
          ISSUE_TITLE: "[Auto] Otter Order-Details Drain Stores failing"
          ISSUE_LABEL: cron-failure
          LOG_FILE: logs/otter-drain-list-stores.log
          FAILED_EXIT_CODE: ${{ steps.fetch.outputs.status }}
        run: bash .github/scripts/report-workflow-failure.sh
      - name: Close incident issue on recovery
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: Otter Order-Details Drain Stores
          ISSUE_TITLE: "[Auto] Otter Order-Details Drain Stores failing"
          ISSUE_LABEL: cron-failure
        run: bash .github/scripts/report-workflow-recovery.sh

  drain:
    needs: list-stores
    if: needs.list-stores.outputs.ids != '[]'
    runs-on: ubuntu-latest
    strategy:
      # max-parallel: 1 — fetchOrderDetails hits Otter's GraphQL endpoint
      # which rate-limits per-token. A single store's drain runs ~5 concurrent
      # requests internally; running multiple stores in parallel risks 429s.
      fail-fast: false
      max-parallel: 1
      matrix:
        storeId: ${{ fromJson(needs.list-stores.outputs.ids) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Drain order details for store ${{ matrix.storeId }}
        id: cron
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OTTER_JWT: ${{ secrets.OTTER_JWT }}
          OTTER_EMAIL: ${{ secrets.OTTER_EMAIL }}
          OTTER_PASSWORD: ${{ secrets.OTTER_PASSWORD }}
          STORE_ID: ${{ matrix.storeId }}
          LIMIT: ${{ github.event.inputs.limit || '1500' }}
          OLDER_THAN_DAYS: ${{ github.event.inputs.olderThanDays || '3' }}
          LOG_FILE: logs/otter-drain-${{ matrix.storeId }}.log
        run: |
          bash .github/scripts/run-with-cron-logging.sh \
            npx tsx scripts/drain-otter-order-details.ts \
            --store-id="$STORE_ID" \
            --limit="$LIMIT" \
            --older-than-days="$OLDER_THAN_DAYS"
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: otter-drain-log-${{ matrix.storeId }}-${{ github.run_id }}
          path: logs/otter-drain-${{ matrix.storeId }}.log
          retention-days: 14
      - name: Open or update incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: Otter Order-Details Drain
          ISSUE_TITLE: "[Auto] Otter Order-Details Drain failing"
          ISSUE_LABEL: cron-failure
          LOG_FILE: logs/otter-drain-${{ matrix.storeId }}.log
          FAILED_EXIT_CODE: ${{ steps.cron.outputs.status }}
        run: bash .github/scripts/report-workflow-failure.sh
      - name: Close incident issue on recovery
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: Otter Order-Details Drain
          ISSUE_TITLE: "[Auto] Otter Order-Details Drain failing"
          ISSUE_LABEL: cron-failure
        run: bash .github/scripts/report-workflow-recovery.sh
