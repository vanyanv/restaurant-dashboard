name: ML Operator Gate Check

# Runs the Phase 1 Weeks 1-4 validation-discipline gate each morning.
# Seven consecutive successful runs unblock Phase 1 Weeks 5-8 scoping.

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: ml-operator-gate-check
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  gate-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install ML deps
        run: |
          python -m venv ml/.venv
          ml/.venv/bin/python -m pip install --upgrade pip
          ml/.venv/bin/python -m pip install -r ml/requirements.txt

      - name: Run operator gate check
        id: gate
        env:
          LOG_FILE: logs/ml-operator-gate-check.log
        run: .github/scripts/run-with-cron-logging.sh ml/.venv/bin/python -m ml.evaluation.operator_gate_check

      - name: Upload gate check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-operator-gate-check-log-${{ github.run_id }}
          path: logs/ml-operator-gate-check.log
          retention-days: 14

      - name: Open or update incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ML Operator Gate Check
          ISSUE_TITLE: "[Auto] ML Operator Gate Check failing"
          ISSUE_LABEL: cron-failure
          LOG_FILE: logs/ml-operator-gate-check.log
          FAILED_EXIT_CODE: ${{ steps.gate.outputs.status }}
        run: bash .github/scripts/report-workflow-failure.sh
