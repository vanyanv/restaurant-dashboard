name: AI Analytics — Overview (hourly)
on:
  schedule:
    # Hourly at :45 — runs after the :30 cogs-sweep so AI insights see the
    # freshest costed data. Open slot in the project's existing cron map.
    - cron: '45 * * * *'
  workflow_dispatch: {}

concurrency:
  group: ai-analytics-overview
  cancel-in-progress: false

jobs:
  list-stores:
    runs-on: ubuntu-latest
    outputs:
      ids: ${{ steps.fetch.outputs.ids }}
    steps:
      - name: GET /api/cron/ai-analytics/stores
        id: fetch
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          payload=$(curl -fsSL "$APP_URL/api/cron/ai-analytics/stores" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 30)
          ids=$(echo "$payload" | jq -c '[.stores[].id]')
          echo "Found stores: $ids"
          echo "ids=$ids" >> "$GITHUB_OUTPUT"

  per-store:
    needs: list-stores
    if: needs.list-stores.outputs.ids != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        storeId: ${{ fromJson(needs.list-stores.outputs.ids) }}
    steps:
      - name: POST /api/cron/ai-analytics/overview?storeId=...
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          STORE_ID: ${{ matrix.storeId }}
        run: |
          response=$(curl -fsSL -X POST \
            "$APP_URL/api/cron/ai-analytics/overview?storeId=$STORE_ID" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 295)
          echo "$response" | jq .
          echo "### Overview · store $STORE_ID" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$response" | jq . >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  rollup:
    needs: list-stores
    if: needs.list-stores.outputs.ids != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/ai-analytics/overview?scope=all
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -fsSL -X POST \
            "$APP_URL/api/cron/ai-analytics/overview?scope=all" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 295)
          echo "$response" | jq .
          echo "### Overview · all-stores rollup" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$response" | jq . >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
