name: COGS Audit (daily gap report)
on:
  schedule:
    # 07:30 UTC — runs after cogs-refresh (07:00) has had time to fill the
    # last 30 days. Reports any (storeId, date) where OtterMenuItem has sales
    # but DailyCogsItem has no rows. Output goes to $GITHUB_STEP_SUMMARY only;
    # check the Actions tab to see the gap report.
    - cron: '30 7 * * *'
  workflow_dispatch:

concurrency:
  group: cogs-audit
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run missing-cogs-days audit
        id: cron
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_FILE: logs/cogs-audit.log
        run: |
          bash .github/scripts/run-with-cron-logging.sh \
            npx tsx scripts/audit/missing-cogs-days.ts
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cogs-audit-log-${{ github.run_id }}
          path: logs/cogs-audit.log
          retention-days: 14
      - name: Open or update incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: COGS Audit
          ISSUE_TITLE: "[Auto] COGS Audit failing"
          ISSUE_LABEL: cron-failure
          LOG_FILE: logs/cogs-audit.log
          FAILED_EXIT_CODE: ${{ steps.cron.outputs.status }}
        run: bash .github/scripts/report-workflow-failure.sh
