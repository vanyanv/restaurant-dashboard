name: CI
# Enforces typecheck + unit tests + ML pytest on every PR. Previously only
# bundle-budget ran on PRs, so tsc/vitest/pytest regressions could merge freely.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'prisma/**'
      - 'ml/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'pytest.ini'
      - 'vitest.config.*'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test

  ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ml/requirements.txt
      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
      - name: ML tests
        run: pytest
