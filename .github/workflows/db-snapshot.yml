name: DB Snapshot
on:
  schedule:
    # Daily at 03:40 UTC — captures pg_database_size + top tables so storage
    # growth and cost projections have real history.
    - cron: '40 3 * * *'
  workflow_dispatch:

concurrency:
  group: db-snapshot
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: POST /api/cron/monitoring/db-snapshot
        id: cron
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          LOG_FILE: logs/db-snapshot.log
          CRON_MAX_TIME: "90"
        run: |
          bash .github/scripts/run-with-cron-logging.sh \
            .github/scripts/curl-cron-json.sh POST "$APP_URL/api/cron/monitoring/db-snapshot"
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: db-snapshot-log-${{ github.run_id }}
          path: logs/db-snapshot.log
          retention-days: 14
      - name: Open or update incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: DB Snapshot
          ISSUE_TITLE: "[Auto] DB Snapshot failing"
          ISSUE_LABEL: cron-failure
          LOG_FILE: logs/db-snapshot.log
          FAILED_EXIT_CODE: ${{ steps.cron.outputs.status }}
        run: bash .github/scripts/report-workflow-failure.sh
