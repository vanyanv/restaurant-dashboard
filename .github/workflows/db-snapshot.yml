name: DB Snapshot
on:
  schedule:
    # Daily at 03:40 UTC — captures pg_database_size + top tables so storage
    # growth and cost projections have real history.
    - cron: '40 3 * * *'
  workflow_dispatch:

concurrency:
  group: db-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/monitoring/db-snapshot
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -fsSL -X POST "$APP_URL/api/cron/monitoring/db-snapshot" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 90)
          echo "$response" | jq .
          {
            echo '```json'
            echo "$response" | jq .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
